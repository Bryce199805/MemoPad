name: Build Desktop App

on:
  push:
    tags: ['v*']
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty to use tauri.conf.json version)'
        required: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: desktop/src-tauri

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'MemoPad v__VERSION__'
          releaseBody: 'MemoPad Desktop App - Open Source (https://github.com/Bryce199805/MemoPad)'
          releaseDraft: true
          prerelease: false
