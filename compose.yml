services:
  backend:
    build: ./backend
    container_name: memopad-backend
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - GIN_MODE=release
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build: ./web
    container_name: memopad-web
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
